name: Build APK

# Executa sempre que houver push na branch main
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Baixa o código do repositório
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Configura Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      # 3️⃣ Instala dependências do Gradle (pré-download)
      - name: Download Dependencies
        run: ./gradlew dependencies

      # 4️⃣ Build do APK de debug
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --max-workers=2

      # 5️⃣ Faz upload do APK como artefato
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: treino-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
