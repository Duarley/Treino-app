name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Pega o código do repositório
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Instala Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3️⃣ Instala utilitários essenciais (tar, unzip, wget)
      - name: Install essential tools
        run: sudo apt-get update && sudo apt-get install -y unzip tar wget build-essential

      # 4️⃣ Cache do Gradle
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/build.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 5️⃣ Cache do Node Modules
      - name: Cache PNPM
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/package-lock.json','**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      # 6️⃣ Configura Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 34
          build-tools: 34.0.0
          cmdline-tools: latest

      # 7️⃣ Instala PNPM e dependências do projeto
      - name: Install PNPM dependencies
        run: |
          corepack enable
          pnpm install

      # 8️⃣ Sincroniza Capacitor com Android
      - name: Capacitor sync Android
        run: pnpx cap sync android

      # 9️⃣ Build do APK
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --max-workers=1

      # 🔟 Upload do APK como artefato
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
