name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout do código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Instalar ferramentas básicas
      - name: Install essential tools
        run: sudo apt-get update && sudo apt-get install -y unzip tar wget build-essential

      # 4️⃣ Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/build.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 5️⃣ Cache PNPM
      - name: Cache PNPM
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml','**/package-lock.json') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      # 6️⃣ Setup Android SDK (corrigido)
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 7️⃣ Instalar SDK necessário
      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # 8️⃣ Instalar dependências
      - name: Install dependencies
        run: |
          corepack enable
          pnpm install

      # 9️⃣ Build do app web (ESSENCIAL)
      - name: Build Web App
        run: pnpm build

      # 🔟 Sincronizar Capacitor
      - name: Capacitor sync Android
        run: npx cap sync android

      # 1️⃣1️⃣ Build APK
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: -Xmx2g

      # 1️⃣2️⃣ Upload do APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
